spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/weekly_commit_test
    username: postgres
    password: postgres

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

  jackson:
    default-property-inclusion: non_null

app:
  security:
    manager-auth-enabled: false
